<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login | Jade &amp; Prosperity</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- OAuth Configuration -->
  <script src="oauth-config.js"></script>

  <!-- Google Sign-In -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Apple Sign-In -->
  <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --jade-primary: #00b386;
      --jade-dark: #00321f;
      --jade-medium: #004b31;
      --jade-light: #00d9a3;
      --jade-pale: #e8f9f4;
      --gold: #f5c842;
      --gold-dark: #c8850a;
      --text-dark: #1a3329;
      --text-medium: #2d5246;
    }

    body {
      background: linear-gradient(135deg, #e8f9f4 0%, #d4f4ea 50%, #c2efe0 100%);
      color: var(--text-dark);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* ══ Mystical Background ══ */
    .mystical-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }


    /* Floating Particles */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--jade-primary);
      border-radius: 50%;
      opacity: 0;
      animation: floatParticle 8s ease-in-out infinite;
      box-shadow: 0 0 12px var(--jade-primary);
    }

    @keyframes floatParticle {
      0%, 100% {
        opacity: 0;
        transform: translateY(0) translateX(0) scale(0);
      }
      10% {
        opacity: 0.6;
      }
      50% {
        opacity: 1;
        transform: translateY(-100vh) translateX(50px) scale(1);
      }
      90% {
        opacity: 0.6;
      }
    }

    /* Bagua Formation (先天八卦阵) */
    .bagua-formation {
      position: absolute;
      width: 300px;
      height: 300px;
      opacity: 0.12;
      animation: rotateBagua 60s linear infinite;
    }

    .bagua-formation-1 {
      top: 10%;
      left: 5%;
      animation-duration: 70s;
    }

    .bagua-formation-2 {
      bottom: 10%;
      right: 5%;
      animation-direction: reverse;
      animation-duration: 90s;
    }

    @keyframes rotateBagua {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Energy Flow Lines */
    .energy-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--jade-primary), transparent);
      opacity: 0;
      animation: flowEnergy 3s ease-in-out infinite;
    }

    @keyframes flowEnergy {
      0% {
        opacity: 0;
        transform: translateX(-100%);
      }
      50% {
        opacity: 0.5;
      }
      100% {
        opacity: 0;
        transform: translateX(100vw);
      }
    }

    /* Glowing Orbs */
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: orbFloat 8s ease-in-out infinite;
    }

    .orb-1 {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, var(--jade-light) 0%, transparent 70%);
      top: 8%;
      left: -8%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
      bottom: 8%;
      right: -8%;
      animation-delay: 2s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--jade-primary) 0%, transparent 70%);
      top: 50%;
      left: -10%;
      animation-delay: 4s;
    }

    .orb-4 {
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, var(--jade-light) 0%, transparent 70%);
      top: 50%;
      right: -10%;
      animation-delay: 6s;
    }

    @keyframes orbFloat {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(30px, -30px) scale(1.1);
      }
      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }
    }

    /* ══ Login Card ══ */
    .login-container {
      position: relative;
      z-index: 10;
      max-width: 480px;
      width: 100%;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 179, 134, 0.2);
      border-radius: 32px;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 20px 60px rgba(0, 50, 31, 0.15),
        inset 0 1px 1px rgba(255, 255, 255, 0.5);
      animation: cardAppear 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-glow {
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, var(--jade-primary), var(--gold));
      border-radius: 32px;
      opacity: 0;
      z-index: -1;
      transition: opacity 0.3s;
      animation: borderGlow 3s ease-in-out infinite;
    }

    .login-card:hover .card-glow {
      opacity: 0.1;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.15; }
    }

    /* ══ Brand Container ══ */
    .brand-container {
      text-align: center;
      margin-bottom: 32px;
      margin-top: 48px;
    }

    .brand-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--jade-primary), var(--jade-medium));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }

    .brand-subtitle {
      color: var(--text-medium);
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    /* ══ Language Toggle ══ */
    .lang-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 179, 134, 0.2);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
      z-index: 10;
    }

    .lang-btn {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-medium);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--jade-primary);
      color: white;
    }

    .lang-btn:hover:not(.active) {
      color: var(--jade-primary);
      background: rgba(0, 179, 134, 0.1);
    }

    /* ══ Input Fields ══ */
    .input-group {
      margin-bottom: 20px;
    }

    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-medium);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.5) !important;
      backdrop-filter: blur(10px) !important;
      border: 2px solid rgba(0, 179, 134, 0.15) !important;
      border-radius: 16px !important;
      padding: 14px 16px !important;
      font-size: 15px !important;
      color: var(--text-dark) !important;
      outline: none !important;
      transition: all 0.3s !important;
      box-shadow: inset 0 2px 4px rgba(0, 50, 31, 0.05) !important;
    }

    .input-field::placeholder {
      color: rgba(45, 82, 70, 0.5) !important;
    }

    .input-field:focus {
      border-color: var(--jade-primary) !important;
      background: rgba(255, 255, 255, 0.8) !important;
      box-shadow:
        0 0 0 3px rgba(0, 179, 134, 0.15),
        inset 0 2px 4px rgba(0, 50, 31, 0.05) !important;
    }

    .input-field:hover:not(:focus) {
      border-color: rgba(0, 179, 134, 0.25) !important;
    }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-medium);
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }

    .eye-btn:hover {
      color: var(--jade-primary);
    }

    /* ══ Checkbox ══ */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .checkbox {
      appearance: none !important;
      width: 20px !important;
      height: 20px !important;
      border: 2px solid rgba(0, 179, 134, 0.3) !important;
      border-radius: 50% !important;
      background: rgba(255, 255, 255, 0.5) !important;
      backdrop-filter: blur(10px) !important;
      cursor: pointer !important;
      transition: all 0.3s !important;
      position: relative !important;
      flex-shrink: 0 !important;
    }

    .checkbox:hover {
      border-color: var(--jade-primary) !important;
      background: rgba(255, 255, 255, 0.8) !important;
    }

    .checkbox:checked {
      background: var(--jade-primary) !important;
      border-color: var(--jade-primary) !important;
      box-shadow: 0 0 0 3px rgba(0, 179, 134, 0.15) !important;
    }

    .checkbox:checked::after {
      content: '' !important;
      position: absolute !important;
      left: 5px !important;
      top: 2px !important;
      width: 4px !important;
      height: 8px !important;
      border: solid white !important;
      border-width: 0 2px 2px 0 !important;
      transform: rotate(45deg) !important;
      display: block !important;
    }

    .checkbox-label {
      font-size: 14px;
      color: var(--text-medium);
    }

    .link {
      color: var(--jade-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      position: relative;
    }

    .link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 2px;
      background: var(--jade-primary);
      transition: width 0.3s;
    }

    .link:hover {
      color: var(--jade-medium);
    }

    .link:hover::after {
      width: 100%;
    }

    /* ══ Buttons ══ */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--jade-primary) 0%, var(--jade-medium) 100%);
      color: white;
      font-weight: 600;
      font-size: 15px;
      padding: 16px 24px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow:
        0 8px 24px rgba(0, 179, 134, 0.25),
        inset 0 1px 1px rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow:
        0 12px 32px rgba(0, 179, 134, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.3);
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ══ Divider ══ */
    .divider {
      display: flex;
      align-items: center;
      margin: 28px 0;
      color: var(--text-medium);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 179, 134, 0.2), transparent);
    }

    .divider span {
      padding: 0 16px;
    }

    /* ══ Social Buttons ══ */
    .btn-social {
      width: 100%;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(0, 179, 134, 0.15);
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dark);
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 12px;
    }

    .btn-social:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(0, 179, 134, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 50, 31, 0.1);
    }

    /* ══ Sign Up Link ══ */
    .signup-text {
      text-align: center;
      margin-top: 28px;
      font-size: 14px;
      color: var(--text-medium);
    }

    .signup-text .link {
      margin-left: 8px;
      color: var(--jade-primary);
      font-weight: 600;
    }

    /* ══ Hidden Class ══ */
    .hidden {
      display: none !important;
    }

    /* ══ Spinner ══ */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ══ Error Banner ══ */
    .error-banner {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ff6b6b;
      font-size: 13px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ══ Responsive ══ */
    @media (max-width: 640px) {
      .login-card {
        padding: 36px 24px;
      }

      .bagua {
        width: 250px;
        height: 250px;
      }

      .lang-toggle {
        top: 16px;
        right: 16px;
      }

      .brand-container {
        margin-top: 56px;
      }

      .brand-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Mystical Background -->
  <div class="mystical-bg">

    <!-- 先天八卦太极图 - Left Formation -->
    <svg class="bagua-formation bagua-formation-1" viewBox="0 0 300 300" fill="none">
      <!-- Outer circle -->
      <circle cx="150" cy="150" r="145" stroke="rgba(0,179,134,0.5)" stroke-width="2.5"/>
      <circle cx="150" cy="150" r="130" stroke="rgba(0,179,134,0.4)" stroke-width="1.5"/>

      <!-- Central Taiji (太极图) -->
      <g>
        <!-- Outer circle of Taiji -->
        <circle cx="150" cy="150" r="70" fill="none" stroke="rgba(0,179,134,0.6)" stroke-width="2.5"/>

        <!-- White half -->
        <path d="M 150,80 A 70,70 0 0,1 150,220 A 35,35 0 0,1 150,150 A 35,35 0 0,0 150,80 Z"
              fill="rgba(255,255,255,0.95)" stroke="rgba(0,179,134,0.5)" stroke-width="1.5"/>

        <!-- Black half -->
        <path d="M 150,80 A 70,70 0 0,0 150,220 A 35,35 0 0,0 150,150 A 35,35 0 0,1 150,80 Z"
              fill="rgba(0,75,49,0.95)" stroke="rgba(0,179,134,0.5)" stroke-width="1.5"/>

        <!-- White dot in black -->
        <circle cx="150" cy="115" r="10" fill="rgba(255,255,255,0.95)"/>

        <!-- Black dot in white -->
        <circle cx="150" cy="185" r="10" fill="rgba(0,75,49,0.95)"/>
      </g>

      <!-- 8 Trigrams with Chinese characters (先天八卦方位) -->
      <!-- 乾 (上/South) - ☰ -->
      <g>
        <g transform="translate(150, 20)">
          <line x1="-15" y1="0" x2="15" y2="0" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-15" y1="7" x2="15" y2="7" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-15" y1="14" x2="15" y2="14" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
        </g>
        <text x="150" y="52" fill="rgba(0,179,134,0.9)" font-size="18" font-weight="bold" text-anchor="middle" font-family="Noto Serif SC, serif">乾</text>
      </g>

      <!-- 兑 (右上/Southeast) - ☱ -->
      <g>
        <g transform="translate(255, 45) rotate(45 0 0)">
          <line x1="-12" y1="0" x2="-3" y2="0" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="3" y1="0" x2="12" y2="0" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-12" y1="7" x2="12" y2="7" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-12" y1="14" x2="12" y2="14" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
        </g>
        <text x="270" y="68" fill="rgba(0,179,134,0.9)" font-size="16" font-weight="bold" text-anchor="middle" font-family="Noto Serif SC, serif">兑</text>
      </g>

      <!-- 离 (右/East) - ☲ -->
      <g>
        <g transform="translate(280, 150) rotate(90 0 0)">
          <line x1="-12" y1="0" x2="12" y2="0" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-12" y1="7" x2="-3" y2="7" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="3" y1="7" x2="12" y2="7" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-12" y1="14" x2="12" y2="14" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
        </g>
        <text x="268" y="156" fill="rgba(0,179,134,0.9)" font-size="16" font-weight="bold" text-anchor="middle" font-family="Noto Serif SC, serif">离</text>
      </g>

      <!-- 震 (右下/Northeast) - ☳ -->
      <g>
        <g transform="translate(255, 255) rotate(135 0 0)">
          <line x1="-12" y1="0" x2="-3" y2="0" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="3" y1="0" x2="12" y2="0" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-12" y1="7" x2="-3" y2="7" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="3" y1="7" x2="12" y2="7" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-12" y1="14" x2="12" y2="14" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
        </g>
        <text x="270" y="238" fill="rgba(0,179,134,0.9)" font-size="16" font-weight="bold" text-anchor="middle" font-family="Noto Serif SC, serif">震</text>
      </g>

      <!-- 坤 (下/North) - ☷ -->
      <g>
        <g transform="translate(150, 280)">
          <line x1="-15" y1="0" x2="-3" y2="0" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="3" y1="0" x2="15" y2="0" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-15" y1="7" x2="-3" y2="7" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="3" y1="7" x2="15" y2="7" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-15" y1="14" x2="-3" y2="14" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="3" y1="14" x2="15" y2="14" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
        </g>
        <text x="150" y="270" fill="rgba(0,179,134,0.9)" font-size="18" font-weight="bold" text-anchor="middle" font-family="Noto Serif SC, serif">坤</text>
      </g>

      <!-- 艮 (左下/Northwest) - ☶ -->
      <g>
        <g transform="translate(45, 255) rotate(-135 0 0)">
          <line x1="-12" y1="0" x2="12" y2="0" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>
          <line x1="-12" y1="7" x2="-3" y2="7" stroke="rgba(0,179,134,0.8)" stroke-width="3.5"/>

  <script>
    // Create particles - distributed on left and right
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';

      // Distribute particles on left (0-30%) and right (70-100%)
      const isLeft = i % 2 === 0;
      const position = isLeft
        ? Math.random() * 30  // Left side: 0-30%
        : 70 + Math.random() * 30;  // Right side: 70-100%

      particle.style.left = position + '%';
      particle.style.animationDelay = Math.random() * 8 + 's';
      particle.style.animationDuration = (Math.random() * 5 + 6) + 's';
      particlesContainer.appendChild(particle);
    }

    // Create energy lines - flowing from both sides
    const energyLinesContainer = document.getElementById('energyLines');
    for (let i = 0; i < 8; i++) {
      const line = document.createElement('div');
      line.className = 'energy-line';
      line.style.top = (10 + i * 12) + '%';
      line.style.width = (Math.random() * 250 + 150) + 'px';
      line.style.animationDelay = i * 0.5 + 's';
      line.style.animationDuration = (Math.random() * 2 + 3) + 's';
      energyLinesContainer.appendChild(line);
    }

    // Language system
    let currentLang = 'en';

    const i18n = {
      en: {
        errorInvalid: 'Invalid email or password. Please try again.',
        errorNetwork: 'Network connection failed. Please check your internet.',
        errorGeneric: 'Something went wrong. Please try again.',
        emailPlaceholder: 'you@example.com',
        passwordPlaceholder: '••••••••'
      },
      zh: {
        errorInvalid: '邮箱或密码无效，请重试。',
        errorNetwork: '网络连接失败，请检查您的网络。',
        errorGeneric: '出现错误，请重试。',
        emailPlaceholder: '你的邮箱@example.com',
        passwordPlaceholder: '••••••••'
      },
      ms: {
        errorInvalid: 'E-mel atau kata laluan tidak sah. Sila cuba lagi.',
        errorNetwork: 'Sambungan rangkaian gagal. Sila semak internet anda.',
        errorGeneric: 'Sesuatu tidak kena. Sila cuba lagi.',
        emailPlaceholder: 'anda@contoh.com',
        passwordPlaceholder: '••••••••'
      }
    };

    function switchLang(lang) {
      currentLang = lang;

      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('lang-' + lang).classList.add('active');

      document.querySelectorAll('[data-en]').forEach(el => {
        const key = 'data-' + lang;
        if (el.hasAttribute(key)) {
          el.textContent = el.getAttribute(key);
        }
      });

      document.getElementById('email').placeholder = i18n[lang].emailPlaceholder;
      document.getElementById('password').placeholder = i18n[lang].passwordPlaceholder;
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');

      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function showError(message) {
      const banner = document.getElementById('errorBanner');
      const text = document.getElementById('errorText');
      text.textContent = message;
      banner.classList.remove('hidden');
      setTimeout(() => banner.classList.add('hidden'), 5000);
    }

    function hideError() {
      document.getElementById('errorBanner').classList.add('hidden');
    }

    // Initialize default users in localStorage if not exists
    function initializeUsers() {
      const usersKey = 'jade_app_users';
      const existingUsers = localStorage.getItem(usersKey);

      if (!existingUsers) {
        // Default users for testing
        const defaultUsers = [
          {
            id: 1,
            email: 'admin@jade.com',
            password: 'admin123',
            name: 'Admin User',
            role: 'admin'
          },
          {
            id: 2,
            email: 'user@jade.com',
            password: 'user123',
            name: 'Test User',
            role: 'user'
          },
          {
            id: 3,
            email: 'demo@jade.com',
            password: 'demo123',
            name: 'Demo User',
            role: 'user'
          }
        ];

        localStorage.setItem(usersKey, JSON.stringify(defaultUsers));
      }
    }

    // Verify user credentials
    function verifyCredentials(email, password) {
      const usersKey = 'jade_app_users';
      const users = JSON.parse(localStorage.getItem(usersKey) || '[]');

      const user = users.find(u => u.email === email && u.password === password);
      return user || null;
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');

      // Validate email format
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showError(i18n[currentLang].errorInvalid);
        return;
      }

      submitBtn.disabled = true;
      btnText.classList.add('hidden');
      btnSpinner.classList.remove('hidden');

      try {
        // Simulate network delay
        await new Promise(resolve => setTimeout(resolve, 800));

        // Verify credentials against stored users
        const user = verifyCredentials(email, password);

        if (!user) {
          throw new Error('Invalid credentials');
        }

        // Store session data
        const sessionData = {
          userId: user.id,
          email: user.email,
          name: user.name,
          role: user.role,
          loginTime: new Date().toISOString()
        };

        // Use sessionStorage for session, or localStorage if "Remember me" is checked
        if (rememberMe) {
          localStorage.setItem('jade_app_session', JSON.stringify(sessionData));
        } else {
          sessionStorage.setItem('jade_app_session', JSON.stringify(sessionData));
        }

        // Success - redirect
        window.location.href = 'index.html';

      } catch (error) {
        // Show error and restore button
        submitBtn.disabled = false;
        btnText.classList.remove('hidden');
        btnSpinner.classList.add('hidden');

        // Show appropriate error message
        const errorMsg = error.message === 'Invalid credentials'
          ? i18n[currentLang].errorInvalid
          : i18n[currentLang].errorNetwork;
        showError(errorMsg);
      }
    }

    // Initialize users on page load
    initializeUsers();

    // ═══════════════════════════════════════════════════════════
    // GOOGLE SIGN-IN
    // ═══════════════════════════════════════════════════════════

    // Initialize Google Sign-In
    function initGoogleSignIn() {
      if (typeof google !== 'undefined' && typeof OAUTH_CONFIG !== 'undefined' && OAUTH_CONFIG.google.clientId) {
        google.accounts.id.initialize({
          client_id: OAUTH_CONFIG.google.clientId,
          callback: handleGoogleCallback,
          auto_select: false,
          cancel_on_tap_outside: true
        });
      }
    }

    // Handle Google Sign-In callback
    function handleGoogleCallback(response) {
      try {
        // Decode JWT token to get user info
        const credential = response.credential;
        const payload = JSON.parse(atob(credential.split('.')[1]));

        // Create user session from Google data
        const sessionData = {
          userId: payload.sub,
          email: payload.email,
          name: payload.name,
          picture: payload.picture,
          role: 'user',
          provider: 'google',
          loginTime: new Date().toISOString()
        };

        // Store session
        sessionStorage.setItem('jade_app_session', JSON.stringify(sessionData));

        // Also save Google user to local users database
        saveOAuthUser(sessionData);

        // Redirect to main app
        window.location.href = 'index.html';

      } catch (error) {
        console.error('Google Sign-In Error:', error);
        showError(i18n[currentLang].errorNetwork);
      }
    }

    // ═══════════════════════════════════════════════════════════
    // APPLE SIGN-IN
    // ═══════════════════════════════════════════════════════════

    // Initialize Apple Sign-In
    function initAppleSignIn() {
      if (typeof AppleID !== 'undefined' && typeof OAUTH_CONFIG !== 'undefined' && OAUTH_CONFIG.apple.serviceId) {
        AppleID.auth.init({
          clientId: OAUTH_CONFIG.apple.serviceId,
          scope: 'name email',
          redirectURI: OAUTH_CONFIG.redirectUri,
          usePopup: true
        });
      }
    }

    // Handle Apple Sign-In
    async function handleAppleSignIn() {
      try {
        if (typeof AppleID === 'undefined') {
          // Fallback: Apple Sign-In not available on this device/browser
          showError('Apple Sign-In is only available on Safari and iOS devices');
          return;
        }

        const response = await AppleID.auth.signIn();

        // Create user session from Apple data
        const sessionData = {
          userId: response.authorization.id_token,
          email: response.user?.email || 'apple_user@privaterelay.appleid.com',
          name: response.user?.name ? `${response.user.name.firstName} ${response.user.name.lastName}` : 'Apple User',
          role: 'user',
          provider: 'apple',
          loginTime: new Date().toISOString()
        };

        // Store session
        sessionStorage.setItem('jade_app_session', JSON.stringify(sessionData));

        // Save Apple user to local users database
        saveOAuthUser(sessionData);

        // Redirect to main app
        window.location.href = 'index.html';

      } catch (error) {
        console.error('Apple Sign-In Error:', error);
        if (error.error !== 'popup_closed_by_user') {
          showError(i18n[currentLang].errorNetwork);
        }
      }
    }

    // ═══════════════════════════════════════════════════════════
    // OAUTH USER MANAGEMENT
    // ═══════════════════════════════════════════════════════════

    // Save OAuth user to local database
    function saveOAuthUser(userData) {
      const usersKey = 'jade_app_users';
      const users = JSON.parse(localStorage.getItem(usersKey) || '[]');

      // Check if user already exists
      const existingUserIndex = users.findIndex(u => u.email === userData.email);

      const userRecord = {
        id: userData.userId,
        email: userData.email,
        name: userData.name,
        picture: userData.picture || null,
        role: userData.role,
        provider: userData.provider,
        lastLogin: userData.loginTime
      };

      if (existingUserIndex >= 0) {
        // Update existing user
        users[existingUserIndex] = { ...users[existingUserIndex], ...userRecord };
      } else {
        // Add new user
        users.push(userRecord);
      }

      localStorage.setItem(usersKey, JSON.stringify(users));
    }

    // ═══════════════════════════════════════════════════════════
    // DEVELOPMENT MODE - SIMULATED OAUTH
    // ═══════════════════════════════════════════════════════════

    // Check if OAuth is configured, otherwise use dev mode
    const DEV_MODE = (typeof OAUTH_CONFIG !== 'undefined' && OAUTH_CONFIG.devMode) ||
                     (typeof OAUTH_CONFIG === 'undefined') ||
                     (!OAUTH_CONFIG.hasAnyProvider());

    function simulateOAuthLogin(provider) {
      // Simulate OAuth popup and user selection
      const demoUsers = {
        google: [
          { email: 'demo.user@gmail.com', name: 'Demo User', picture: 'https://ui-avatars.com/api/?name=Demo+User&background=00b386&color=fff' },
          { email: 'test.account@gmail.com', name: 'Test Account', picture: 'https://ui-avatars.com/api/?name=Test+Account&background=f5c842&color=000' },
          { email: 'john.doe@gmail.com', name: 'John Doe', picture: 'https://ui-avatars.com/api/?name=John+Doe&background=004b31&color=fff' }
        ],
        apple: [
          { email: 'demo@privaterelay.appleid.com', name: 'Demo User' },
          { email: 'test@privaterelay.appleid.com', name: 'Test Account' },
          { email: 'john@privaterelay.appleid.com', name: 'John Doe' }
        ]
      };

      const users = demoUsers[provider] || demoUsers.google;
      const randomUser = users[Math.floor(Math.random() * users.length)];

      // Show a simulated "account selection" dialog
      const confirmMsg = provider === 'google'
        ? `🔵 Google Sign-In (Dev Mode)\n\nContinue with:\n${randomUser.name}\n${randomUser.email}?`
        : `🍎 Apple Sign-In (Dev Mode)\n\nContinue with:\n${randomUser.name}\n${randomUser.email}?`;

      if (!confirm(confirmMsg)) {
        return false;
      }

      // Simulate network delay
      setTimeout(() => {
        const sessionData = {
          userId: `${provider}_${Date.now()}`,
          email: randomUser.email,
          name: randomUser.name,
          picture: randomUser.picture || null,
          role: 'user',
          provider: provider,
          loginTime: new Date().toISOString()
        };

        // Store session
        sessionStorage.setItem('jade_app_session', JSON.stringify(sessionData));

        // Save to local users database
        saveOAuthUser(sessionData);

        // Redirect to main app
        window.location.href = 'index.html';
      }, 800);

      return true;
    }

    // ═══════════════════════════════════════════════════════════
    // SOCIAL LOGIN DISPATCHER
    // ═══════════════════════════════════════════════════════════

    function socialLogin(provider) {
      const btn = event.currentTarget;
      btn.disabled = true;
      btn.style.opacity = '0.6';

      // Development mode: Use simulated OAuth
      if (DEV_MODE) {
        const success = simulateOAuthLogin(provider);
        if (!success) {
          btn.disabled = false;
          btn.style.opacity = '1';
        }
        return;
      }

      // Production mode: Use real OAuth
      if (provider === 'google') {
        // Trigger Google One Tap or standard sign-in
        if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
          google.accounts.id.prompt((notification) => {
            if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
              // One Tap not shown, show standard flow
              console.log('Google One Tap not available, using redirect flow');

              // For production, use OAuth2 redirect flow
              const clientId = OAUTH_CONFIG?.google?.clientId || 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
              const redirectUri = OAUTH_CONFIG?.redirectUri || (window.location.origin + '/login-mystical.html');

              const googleAuthUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
                `client_id=${clientId}&` +
                `redirect_uri=${encodeURIComponent(redirectUri)}&` +
                `response_type=token&` +
                `scope=email profile`;

              window.location.href = googleAuthUrl;
            }
          });
        } else {
          // Google SDK not loaded, show error
          btn.disabled = false;
          btn.style.opacity = '1';
          showError('Google Sign-In is currently unavailable. Please try again later.');
        }
      } else if (provider === 'apple') {
        handleAppleSignIn().catch(() => {
          btn.disabled = false;
          btn.style.opacity = '1';
        });
      }
    }

    // ═══════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════

    // Initialize OAuth providers on page load
    window.addEventListener('load', () => {
      initGoogleSignIn();
      initAppleSignIn();

      // Handle OAuth redirects (for Google redirect flow)
      const hash = window.location.hash;
      if (hash) {
        const params = new URLSearchParams(hash.substring(1));
        const accessToken = params.get('access_token');

        if (accessToken) {
          // Fetch user info from Google
          fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
            headers: { Authorization: `Bearer ${accessToken}` }
          })
          .then(res => res.json())
          .then(userInfo => {
            const sessionData = {
              userId: userInfo.id,
              email: userInfo.email,
              name: userInfo.name,
              picture: userInfo.picture,
              role: 'user',
              provider: 'google',
              loginTime: new Date().toISOString()
            };

            sessionStorage.setItem('jade_app_session', JSON.stringify(sessionData));
            saveOAuthUser(sessionData);

            // Clean URL and redirect
            window.history.replaceState({}, document.title, window.location.pathname);
            window.location.href = 'index.html';
          })
          .catch(error => {
            console.error('Failed to fetch Google user info:', error);
            showError(i18n[currentLang].errorNetwork);
          });
        }
      }
    });
  </script>
